name: Scheduled Build

on:
  schedule:
    - cron: '0 4 * * 0'   # Weekly — Sunday 4 AM UTC (amd64 only)
    - cron: '0 4 1 * *'   # Monthly — 1st of month 4 AM UTC (amd64 + arm64)
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build'
        type: choice
        default: 'linux/amd64'
        options:
          - 'linux/amd64'
          - 'linux/amd64,linux/arm64'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/python-base

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      platforms: ${{ steps.platforms.outputs.platforms }}
    steps:
      - name: Determine platforms
        id: platforms
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "platforms=${{ inputs.platforms }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          elif [[ "$(date +%d)" == "01" ]]; then
            # Monthly run (1st of month) — include arm64
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            # Weekly run — amd64 only
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi
          echo "Building for: $(cat "$GITHUB_OUTPUT" | grep platforms | cut -d= -f2)"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect latest CPython versions and build matrix
        id: matrix
        run: |
          set -euo pipefail

          FTP_INDEX=$(curl -sL https://www.python.org/ftp/python/)

          build_matrix='{"include":['
          first=true

          for MINOR in 3.12 3.13 3.14; do
            LATEST=$(echo "$FTP_INDEX" \
              | grep -oP "${MINOR//./\\.}\.\d+" \
              | sort -t. -k3 -n \
              | tail -1)

            if [[ -z "$LATEST" ]]; then
              echo "WARNING: No release found for ${MINOR}.x — skipping"
              continue
            fi

            # Check if already published (skip if so, unless manual/push)
            SKIP="false"
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              if docker manifest inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${LATEST}" > /dev/null 2>&1; then
                echo "Version ${LATEST} already published — skipping"
                SKIP="true"
              fi
            fi

            if [[ "$SKIP" == "false" ]]; then
              [[ "$first" == "true" ]] && first=false || build_matrix+=','
              build_matrix+="{\"minor\":\"${MINOR}\",\"version\":\"${LATEST}\"}"
            fi
          done

          build_matrix+=']}'

          # Check if matrix is empty
          COUNT=$(echo "$build_matrix" | jq '.include | length')
          if [[ "$COUNT" -eq 0 ]]; then
            echo "No versions to build"
            echo "matrix=" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=${build_matrix}" >> "$GITHUB_OUTPUT"
            echo "Building: ${build_matrix}"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.matrix != ''
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: contains(needs.detect.outputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          set -euo pipefail
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.minor }}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.version }}"
          # Only tag :latest for the highest minor version (3.14)
          if [[ "${{ matrix.minor }}" == "3.14" ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ needs.detect.outputs.platforms }}
          build-args: |
            PYTHON_VERSION=${{ matrix.version }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=python-base
            org.opencontainers.image.description=PGO+LTO optimized CPython ${{ matrix.minor }} on Debian Bookworm
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ matrix.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=python-${{ matrix.minor }}
          cache-to: type=gha,mode=max,scope=python-${{ matrix.minor }}

      - name: Post summary
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Python Base Image Build — ${{ matrix.minor }}

          | Key | Value |
          |-----|-------|
          | Python version | \`${{ matrix.version }}\` |
          | Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.version }}\` |
          | Platforms | \`${{ needs.detect.outputs.platforms }}\` |
          | Digest | \`${{ steps.build.outputs.digest }}\` |
          | Trigger | \`${{ github.event_name }}\` |
          EOF
