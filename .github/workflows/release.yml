name: Release Build

on:
  push:
    tags:
      - 'v3.12.*'
      - 'v3.13.*'
      - 'v3.14.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/python-base

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Extract version from tag
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          MINOR="${VERSION%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
          echo "Building Python ${VERSION} (minor: ${MINOR})"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          set -euo pipefail
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          # Only tag :latest for 3.14
          if [[ "${{ steps.version.outputs.minor }}" == "3.14" ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PYTHON_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=python-base
            org.opencontainers.image.description=PGO+LTO optimized CPython ${{ steps.version.outputs.minor }} on Debian Bookworm
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=python-${{ steps.version.outputs.minor }}
          cache-to: type=gha,mode=max,scope=python-${{ steps.version.outputs.minor }}

      - name: Post summary
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Python Base Image Release

          | Key | Value |
          |-----|-------|
          | Python version | \`${{ steps.version.outputs.version }}\` |
          | Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\` |
          | Platforms | \`linux/amd64, linux/arm64\` |
          | Digest | \`${{ steps.build.outputs.digest }}\` |
          | Tag | \`${{ github.ref_name }}\` |
          EOF
